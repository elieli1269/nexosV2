name: CI

on:
  push:
    branches: [ main, master, github-upload/nexos-v2 ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

    - name: Lint / Syntax check backend
      run: |
        python -m py_compile nexos-live/config/includes.chroot/usr/local/bin/nexos-backend.py || true

    - name: Sanity check UI
      run: |
        if [ -f "nexos-live/index.html" ]; then echo "index.html found"; else echo "index.html missing"; exit 1; fi
