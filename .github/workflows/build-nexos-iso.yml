name: Build Nexos Live ISO

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq live-build debootstrap
          lb --version

      - name: Verify required files
        working-directory: nexos-live
        run: |
          echo "Checking required files..."
          [ -f "index.html" ] && echo "✓ index.html" || exit 1
          [ -f "nexos-launch.sh" ] && echo "✓ nexos-launch.sh" || exit 1

      - name: Prepare build environment
        working-directory: nexos-live
        run: |
          mkdir -p config/includes.chroot/usr/share/nexos-ui
          mkdir -p config/includes.chroot/usr/local/bin
          chmod +x nexos-launch.sh

      - name: Copy UI files
        working-directory: nexos-live
        run: |
          cp -f index.html config/includes.chroot/usr/share/nexos-ui/
          cp -f nexos-launch.sh config/includes.chroot/usr/local/bin/
          chmod +x config/includes.chroot/usr/local/bin/nexos-launch.sh

      - name: Clean previous builds
        working-directory: nexos-live
        run: |
          rm -rf cache/ chroot/ build/ *.iso *.log *.sha256 2>/dev/null || true
          sudo lb clean --all 2>&1 | tail -5

      - name: Configure live-build
        working-directory: nexos-live
        run: |
          sudo lb config \
            --distribution jammy \
            --architecture amd64 \
            --archive-areas "main universe" \
            --binary-images iso-hybrid \
            --apt-indices false \
            --debian-installer false \
            --memtest none \
            --bootappend-live "boot=live components"

      - name: Build ISO
        working-directory: nexos-live
        run: |
          echo "Starting build..."
          df -h | head -3
          sudo lb build 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "✗ lb build failed with exit code $BUILD_EXIT"
            tail -50 build.log
            exit $BUILD_EXIT
          fi
          if [ -f "live-image-amd64.hybrid.iso" ]; then
            SIZE=$(du -h live-image-amd64.hybrid.iso | cut -f1)
            echo "✓ ISO created: $SIZE"
          else
            echo "✗ ISO not found"
            find . -maxdepth 2 -name '*.iso' -type f 2>/dev/null || echo "No .iso found"
            tail -50 build.log
            exit 1
          fi

      - name: Generate checksum
        if: success()
        working-directory: nexos-live
        run: |
          sha256sum live-image-amd64.hybrid.iso > live-image-amd64.hybrid.iso.sha256
          cat live-image-amd64.hybrid.iso.sha256

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso
          path: |
            nexos-live/live-image-amd64.hybrid.iso
            nexos-live/live-image-amd64.hybrid.iso.sha256
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: nexos-live/build.log
          retention-days: 5
