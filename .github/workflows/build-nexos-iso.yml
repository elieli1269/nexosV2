name: Build Nexos Live ISO

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'nexos-live/**'
      - '.github/workflows/build-nexos-iso.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'nexos-live/**'
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build debootstrap

      - name: Verify UI file
        run: |
          if [ ! -f "nexos-live/index.html" ]; then
            echo "ERROR: nexos-live/index.html not found!"
            exit 1
          fi
          echo "✓ UI file found"

      - name: Prepare build directory
        run: |
          cd nexos-live
          chmod +x build.sh
          # Préparation des répertoires
          mkdir -p config/includes.chroot/usr/share/nexos-ui
          mkdir -p config/includes.chroot/usr/local/bin

      - name: Build ISO
        run: |
          cd nexos-live
          # Adapter le script pour GitHub Actions (sudo automatique pour lb)
          set -e
          echo "=== Environment ==="
          whoami
          pwd
          df -h
          ls -la

          UI_SRC="index.html"
          UI_DST="config/includes.chroot/usr/share/nexos-ui/index.html"

          echo "=== Preparing UI ==="
          mkdir -p "$(dirname "$UI_DST")"
          cp -r -f "$UI_SRC" "$(dirname "$UI_DST")"
          cp -f nexos-launch.sh config/includes.chroot/usr/local/bin/nexos-launch.sh
          chmod +x config/includes.chroot/usr/local/bin/nexos-launch.sh

          echo "=== Cleaning previous builds ==="
          rm -rf cache/ chroot/ build/ *.iso *.log 2>/dev/null || true

          echo "=== Configuring live-build ==="
          sudo lb clean --all || true
          sudo lb config \
            --distribution jammy \
            --architecture amd64 \
            --archive-areas "main universe multiverse" \
            --binary-images iso-hybrid \
            --apt-indices true \
            --debian-installer false \
            --memtest none \
            --bootappend-live "boot=live components persistence"

          echo "=== Running lb build ==="
          sudo lb build

          echo "=== Build complete, checking for ISO ==="
          ls -lh
          find . -type f -name '*.iso' -print -exec ls -lh {} \; 2>/dev/null || true
          if [ -f "live-image-amd64.hybrid.iso" ]; then
            echo "✓ SUCCESS: Found live-image-amd64.hybrid.iso"
            ls -lh live-image-amd64.hybrid.iso
          else
            echo "✗ ERROR: live-image-amd64.hybrid.iso not found!"
            exit 1
          fi

      - name: Generate checksum
        if: success()
        run: |
          cd nexos-live
          sha256sum live-image-amd64.hybrid.iso > live-image-amd64.hybrid.iso.sha256
          cat live-image-amd64.hybrid.iso.sha256

      - name: Upload ISO artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso-${{ github.ref_name }}
          path: |
            nexos-live/live-image-amd64.hybrid.iso
            nexos-live/live-image-amd64.hybrid.iso.sha256
          retention-days: 30

      - name: Create Release (tags only)
        if: startsWith(github.ref, 'refs/tags/') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            nexos-live/live-image-amd64.hybrid.iso
            nexos-live/live-image-amd64.hybrid.iso.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ ISO build successful! ISO available in artifacts.'
            })

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Build failed. Check logs above."
          exit 1
