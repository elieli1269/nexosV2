name: Build NEXOS ISO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y live-build debootstrap xorriso syslinux-utils isolinux rsync genisoimage squashfs-tools
      
      - name: Prepare & Build NEXOS ISO (debug enabled)
        run: |
          set -euxo pipefail
          ls -la
          if [ ! -d "nexos-live" ]; then echo "nexos-live directory not found"; exit 2; fi
          cd nexos-live
          pwd
          echo "---- build.sh content ----"
          sed -n '1,200p' build.sh || true
          chmod +x build.sh
          bash -x ./build.sh 2>&1 | tee build.log
          tail -n 200 build.log || true
      
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso
          path: nexos-live/live-image-amd64.hybrid.iso
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: nexos-live/live-image-amd64.hybrid.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
