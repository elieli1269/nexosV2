name: Build NEXOS ISO

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y live-build debootstrap xorriso syslinux-utils isolinux rsync genisoimage squashfs-tools
      
      - name: Configure sudo for live-build
        run: |
          sudo usermod -aG sudo $USER || true
          sudo -v
      
      - name: Prepare & Build NEXOS ISO (debug enabled)
        run: |
          set -eux
          ls -la
          if [ ! -d "nexos-live" ]; then echo "nexos-live directory not found"; exit 2; fi
          cd nexos-live
          pwd
          echo "---- build.sh content ----"
          sed -n '1,200p' build.sh || true
          chmod +x build.sh
          echo "---- Starting build ----"
          set +e
          timeout 3600 bash -x ./build.sh 2>&1 | tee ../build.log
          BUILD_EXIT=$?
          set -e
          echo "---- Build exit code: $BUILD_EXIT ----"
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "Build FAILED! Showing last 500 lines of output:"
            tail -n 500 ../build.log || true
          fi
          tail -n 100 ../build.log || true
          echo "==== Post-build directory listing in nexos-live ===="
          find . -type f | sort | sed 's#^#FILE: #' || true
          exit $BUILD_EXIT
      
      - name: Locate ISO artifact
        if: always()
        id: locate_iso
        run: |
          set -eux
          cd nexos-live || exit 2
          echo "---- Directory structure (first 30 items) ----"
          find . -type f | head -30 | sort || true
          echo ""
          echo "---- Searching for all .iso files (recursive) ----"
          find . -type f -name '*.iso' -print | sort || true
          echo ""
          echo "---- Searching for all .hybrid.iso files ----"
          find . -type f -name '*.hybrid.iso' -print | sort || true
          echo ""
          echo "---- Searching for all .iso files ----"
          find . -type f -name '*.iso' -print | sort || true
          echo ""
          ISO=$(find . -type f \( -name '*.hybrid.iso' -o -name '*.iso' \) -print -quit 2>/dev/null || true)
          if [ -n "$ISO" ]; then
            ISO_ABS="$(cd "$(dirname "$ISO")" && pwd)/$(basename "$ISO")"
            echo "ISO_PATH=$ISO_ABS" >> $GITHUB_ENV
            echo "Found ISO: $ISO_ABS"
            ls -lh "$ISO_ABS"
          else
            echo "No ISO found in nexos-live directory tree"
            echo "ISO_PATH=" >> $GITHUB_ENV
          fi

      - name: Upload build log when no ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Debug upload directory listing
        if: always()
        run: |
          cd nexos-live
          echo "=== Complete directory tree ===" > /tmp/dir_listing.txt
          find . -type f -name '*.iso' -o -type f -name '*.img' >> /tmp/dir_listing.txt 2>&1 || true
          echo "" >> /tmp/dir_listing.txt
          echo "=== All files with details ===" >> /tmp/dir_listing.txt
          find . -type f | xargs ls -lh >> /tmp/dir_listing.txt 2>&1 || true
          cat /tmp/dir_listing.txt

      - name: Upload directory listing debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: directory-listing
          path: /tmp/dir_listing.txt
          retention-days: 7

      - name: Upload ISO artifact
        if: env.ISO_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso
          path: ${{ env.ISO_PATH }}
          retention-days: 30

      - name: Upload any ISO artifacts found (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso-fallback
          path: |
            nexos-live/*.iso
            nexos-live/**/*.iso
          if-no-files-found: ignore
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && env.ISO_PATH != ''
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ISO_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
