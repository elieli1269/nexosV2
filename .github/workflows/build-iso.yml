name: Build NEXOS ISO

on:
  push:
    branches:
      - main
      - github-upload/nexos-v2
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y live-build debootstrap xorriso syslinux-utils isolinux rsync genisoimage squashfs-tools
      
      - name: Configure sudo for live-build
        run: |
          sudo usermod -aG sudo $USER || true
          sudo -v
      
      - name: Prepare & Build NEXOS ISO (debug enabled)
        run: |
          set -euxo pipefail
          ls -la
          if [ ! -d "nexos-live" ]; then echo "nexos-live directory not found"; exit 2; fi
          cd nexos-live
          pwd
          echo "---- build.sh content ----"
          sed -n '1,200p' build.sh || true
          chmod +x build.sh
          timeout 3600 bash -x ./build.sh 2>&1 | tee build.log || true
          tail -n 300 build.log || true
      
      - name: Locate ISO artifact
        id: locate_iso
        run: |
          set -eux
          cd nexos-live || exit 2
          # find the first hybrid ISO produced by live-build
          find . -type f -name '*hybrid.iso' -print | tee iso_list.txt || true
          ISO_REL=$(head -n1 iso_list.txt || true)
          if [ -n "$ISO_REL" ]; then
            ISO_ABS="$PWD/$ISO_REL"
            echo "ISO_PATH=$ISO_ABS" >> $GITHUB_ENV
            echo "Found ISO: $ISO_ABS"
          else
            echo "No ISO found in nexos-live"
          fi

      - name: Upload ISO artifact
        if: env.ISO_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso
          path: ${{ env.ISO_PATH }}
          retention-days: 30

      - name: Upload build log when no ISO
        if: env.ISO_PATH == ''
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: nexos-live/build.log
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && env.ISO_PATH != ''
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ISO_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
