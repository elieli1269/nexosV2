name: Build NEXOS ISO

on:
  push:
    branches:
      - main
      - github-upload/nexos-v2
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            live-build \
            debootstrap \
            xorriso \
            syslinux-utils \
            isolinux \
            rsync \
            genisoimage \
            squashfs-tools
      
      - name: Configure sudo for live-build
        run: |
          sudo usermod -aG sudo $USER || true
          sudo -v
      
      - name: Prepare & Build NEXOS ISO (debug enabled)
        run: |
          set -euxo pipefail
          ls -la
          if [ ! -d "nexos-live" ]; then echo "nexos-live directory not found"; exit 2; fi
          cd nexos-live
          pwd
          echo "---- build.sh content ----"
          sed -n '1,200p' build.sh || true
          chmod +x build.sh
          echo "---- System Info ----"
          df -h || true
          free -h || true
          echo "---- Starting build (timeout 3600s) ----"
          if timeout 3600 bash -eux ./build.sh 2>&1 | tee build.log; then
            echo "Build succeeded"
          else
            BUILD_EXIT=$?
            echo "Build failed with exit code: $BUILD_EXIT"
            echo "---- Last 500 lines of build.log ----"
            tail -n 500 build.log || true
            echo "---- Contents of cache/ ----"
            find cache -type f -name "*.log" -o -name "*.txt" 2>/dev/null | head -20 | xargs -I {} sh -c 'echo "=== {} ===" && head -50 {}' || true
            echo "---- Contents of chroot/var/log/ ----"
            find chroot/var/log -type f 2>/dev/null | head -10 | xargs -I {} sh -c 'echo "=== {} ===" && tail -30 {}' || true
            exit $BUILD_EXIT
          fi
      
      - name: Locate ISO artifact
        if: always()
        id: locate_iso
        run: |
          set -eux
          cd nexos-live || exit 2
          echo "---- Directory structure (first 30 items) ----"
          find . -type f | head -30 | sort || true
          echo ""
          echo "---- Searching for all .iso files (recursive) ----"
          find . -type f -name '*.iso' -print | sort || true
          echo ""
          echo "---- Searching for all .hybrid.iso files ----"
          find . -type f -name '*.hybrid.iso' -print | sort || true
          echo ""
          ISO=$(find . -type f -name '*.hybrid.iso' -print -quit 2>/dev/null || true)
          if [ -z "$ISO" ]; then
            ISO=$(find . -type f -name '*.iso' -print -quit 2>/dev/null || true)
          fi
          if [ -n "$ISO" ]; then
            ISO_ABS="$(cd "$(dirname "$ISO")" && pwd)/$(basename "$ISO")"
            echo "ISO_PATH=$ISO_ABS" >> $GITHUB_ENV
            echo "Found ISO: $ISO_ABS"
            ls -lh "$ISO_ABS"
          else
            echo "No ISO found in nexos-live directory tree"
            echo "ISO_PATH=" >> $GITHUB_ENV
          fi

      - name: Upload build log when no ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: nexos-live/build.log
          retention-days: 7

      - name: Debug upload directory listing
        if: always()
        run: |
          cd nexos-live
          echo "=== Complete directory tree ===" > /tmp/dir_listing.txt
          find . -type f -name '*.iso' -o -type f -name '*.img' >> /tmp/dir_listing.txt 2>&1 || true
          echo "" >> /tmp/dir_listing.txt
          echo "=== All files with details ===" >> /tmp/dir_listing.txt
          find . -type f | xargs ls -lh >> /tmp/dir_listing.txt 2>&1 || true
          cat /tmp/dir_listing.txt

      - name: Upload directory listing debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: directory-listing
          path: /tmp/dir_listing.txt
          retention-days: 7

      - name: Upload ISO artifact
        if: env.ISO_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: nexos-iso
          path: ${{ env.ISO_PATH }}
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') && env.ISO_PATH != ''
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ISO_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
